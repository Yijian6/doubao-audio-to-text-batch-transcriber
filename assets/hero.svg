  </text>
  <text x="145" y="590" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="22">
    2. 填好 config.json
  </text>
  <text x="145" y="625" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="22">
    3. 运行一次，结果输出到 output/
  </text>

  <rect x="860" y="120" width="570" height="520" rx="26" fill="#FFFFFF"/>
  <rect x="860" y="120" width="570" height="520" rx="26" stroke="#D0D5DD" stroke-width="2"/>

  <text x="900" y="185" fill="#101828" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
