  </text>

  <rect x="140" y="320" width="340" height="280" rx="20" fill="#F8FAFC" stroke="#D0D5DD" stroke-width="2"/>
  <text x="170" y="380" fill="#101828" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    1. 输入目录
  </text>
  <text x="170" y="435" fill="#344054" font-family="Consolas, monospace" font-size="24">input/</text>
  <text x="170" y="480" fill="#344054" font-family="Consolas, monospace" font-size="24">- interview.mp3</text>
  <text x="170" y="520" fill="#344054" font-family="Consolas, monospace" font-size="24">- meeting.m4a</text>
  <text x="170" y="560" fill="#344054" font-family="Consolas, monospace" font-size="24">- lecture.wav</text>

  <rect x="630" y="290" width="340" height="340" rx="24" fill="#111827"/>
  <text x="680" y="380" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">
    Doubao ASR
  </text>
  <text x="680" y="430" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="24">
