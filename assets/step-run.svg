<svg width="1600" height="960" viewBox="0 0 1600 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="960" fill="#F5F7FB"/>
  <rect x="80" y="70" width="1440" height="820" rx="24" fill="white" stroke="#D0D5DD" stroke-width="2"/>
  <text x="120" y="145" fill="#101828" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">步骤 2：把音频放进 input/ 并运行</text>
  <text x="120" y="190" fill="#475467" font-family="Segoe UI, Arial, sans-serif" font-size="24">双击 run_transcribe.bat，或者直接执行 Python 命令。</text>

  <rect x="120" y="240" width="1360" height="590" rx="18" fill="#0B1220"/>
  <circle cx="155" cy="275" r="8" fill="#F97066"/>
  <circle cx="180" cy="275" r="8" fill="#FEC84B"/>
  <circle cx="205" cy="275" r="8" fill="#32D583"/>
  <text x="245" y="283" fill="#98A2B3" font-family="Consolas, monospace" font-size="22">Windows PowerShell</text>

  <text x="160" y="350" fill="#D0D5DD" font-family="Consolas, monospace" font-size="24">PS C:\Users\you\doubao-audio-to-text-batch-transcriber&gt; python .\doubao_batch_transcribe.py</text>
  <text x="160" y="390" fill="#D0D5DD" font-family="Consolas, monospace" font-size="24">[1/3] TRANSCRIBE ...\input\Episode-01.mp3</text>
  <text x="160" y="430" fill="#6CE9A6" font-family="Consolas, monospace" font-size="24">[1/3] DONE ...\output\Episode-01.txt</text>
  <text x="160" y="470" fill="#D0D5DD" font-family="Consolas, monospace" font-size="24">[2/3] TRANSCRIBE ...\input\Meeting-Notes.m4a</text>
  <text x="160" y="510" fill="#6CE9A6" font-family="Consolas, monospace" font-size="24">[2/3] DONE ...\output\Meeting-Notes.txt</text>
  <text x="160" y="550" fill="#D0D5DD" font-family="Consolas, monospace" font-size="24">[3/3] TRANSCRIBE ...\input\archive\Lecture.wav</text>
  <text x="160" y="590" fill="#6CE9A6" font-family="Consolas, monospace" font-size="24">[3/3] DONE ...\output\archive\Lecture.txt</text>
  <text x="160" y="650" fill="#FEC84B" font-family="Consolas, monospace" font-size="24">Finished. success=3, skipped=0, failed=0</text>

  <rect x="1030" y="350" width="360" height="210" rx="16" fill="#111827" stroke="#344054" stroke-width="2"/>
  <text x="1060" y="400" fill="#F9FAFB" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">两种启动方式</text>
  <text x="1060" y="445" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="22">1. 音频先复制到 input/</text>
  <text x="1060" y="480" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="22">2. 双击 run_transcribe.bat</text>
  <text x="1060" y="515" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="22">3. 也可以手动执行 Python 命令</text>

  <rect x="120" y="760" width="520" height="54" rx="12" fill="#EFF8FF" stroke="#B2DDFF" stroke-width="2"/>
  <text x="150" y="795" fill="#175CD3" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">批量模式会逐个处理文件，并把状态写入日志</text>
</svg>
