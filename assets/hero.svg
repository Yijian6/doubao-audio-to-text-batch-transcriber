  </text>

  <rect x="900" y="225" width="200" height="290" rx="16" fill="#F8FAFC" stroke="#D0D5DD" stroke-width="2"/>
  <text x="935" y="270" fill="#101828" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">input/</text>
  <text x="935" y="320" fill="#344054" font-family="Consolas, monospace" font-size="18">interview.mp3</text>
  <text x="935" y="355" fill="#344054" font-family="Consolas, monospace" font-size="18">meeting.m4a</text>
  <text x="935" y="390" fill="#344054" font-family="Consolas, monospace" font-size="18">lecture.wav</text>

  <path d="M1130 370H1180" stroke="#667085" stroke-width="8" stroke-linecap="round"/>
  <path d="M1160 345L1190 370L1160 395" stroke="#667085" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="1210" y="225" width="180" height="290" rx="16" fill="#101828"/>
  <text x="1246" y="270" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Doubao</text>
  <text x="1240" y="305" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="20">Flash API</text>
  <text x="1240" y="365" fill="#EAECF0" font-family="Segoe UI, Arial, sans-serif" font-size="18">本地直传</text>
  <text x="1240" y="400" fill="#EAECF0" font-family="Segoe UI, Arial, sans-serif" font-size="18">批量处理</text>
  <text x="1240" y="435" fill="#EAECF0" font-family="Segoe UI, Arial, sans-serif" font-size="18">输出 txt</text>

  <rect x="900" y="545" width="490" height="54" rx="14" fill="#ECFDF3" stroke="#ABEFC6" stroke-width="2"/>
  <text x="930" y="580" fill="#067647" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
