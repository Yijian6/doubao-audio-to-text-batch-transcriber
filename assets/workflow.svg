<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#F5F7FB"/>
  <rect x="90" y="120" width="1420" height="660" rx="24" fill="white"/>
  <rect x="90" y="120" width="1420" height="660" rx="24" stroke="#D7DDEA" stroke-width="2"/>

  <text x="130" y="190" fill="#101828" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">
