<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="760" fill="#F6F8FC"/>
  <rect x="48" y="48" width="1504" height="664" rx="28" fill="#0F1728"/>
  <rect x="48" y="48" width="1504" height="664" rx="28" stroke="#1D2939" stroke-width="2"/>

  <text x="110" y="170" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">
    Doubao Audio to Text
  </text>
  <text x="110" y="235" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="34">
    Batch Transcriber
  </text>
  <text x="110" y="305" fill="#98A2B3" font-family="Segoe UI, Arial, sans-serif" font-size="26">
    把本地音频文件夹，直接批量转成文字稿
  </text>

  <rect x="110" y="360" width="220" height="54" rx="14" fill="#FFFFFF"/>
  <text x="142" y="395" fill="#101828" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Local Audio In
  </text>

  <rect x="354" y="360" width="220" height="54" rx="14" fill="#1D2939" stroke="#344054" stroke-width="2"/>
  <text x="388" y="395" fill="#F9FAFB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Plain Text Out
  </text>

  <rect x="110" y="455" width="490" height="150" rx="20" fill="#111827" stroke="#344054" stroke-width="2"/>
  <text x="145" y="510" fill="#F9FAFB" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">
    核心使用路径
  </text>
  <text x="145" y="555" fill="#D0D5DD" font-family="Segoe UI, Arial, sans-serif" font-size="22">
