  </text>
  <text x="1150" y="435" fill="#344054" font-family="Consolas, monospace" font-size="24">output/</text>
  <text x="1150" y="480" fill="#344054" font-family="Consolas, monospace" font-size="24">- interview.txt</text>
  <text x="1150" y="520" fill="#344054" font-family="Consolas, monospace" font-size="24">- meeting.txt</text>
  <text x="1150" y="560" fill="#344054" font-family="Consolas, monospace" font-size="24">- lecture.txt</text>

  <path d="M500 460H590" stroke="#667085" stroke-width="10" stroke-linecap="round"/>
  <path d="M560 430L610 460L560 490" stroke="#667085" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <path d="M990 460H1080" stroke="#667085" stroke-width="10" stroke-linecap="round"/>
  <path d="M1050 430L1100 460L1050 490" stroke="#667085" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="560" y="690" width="500" height="54" rx="12" fill="#ECFDF3" stroke="#ABEFC6" stroke-width="2"/>
  <text x="604" y="725" fill="#067647" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">
